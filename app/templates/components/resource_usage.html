{% extends "base.html" %}

{% block content %}

<!-- 실시간 모니터링 섹션 -->
<div id="realtime-tab">
    <!-- 모니터링 설정 바 -->
    <div class="settings-bar mb-5">
        <div class="is-flex is-align-items-center" style="gap: 1rem;">
            <div class="is-flex is-align-items-center" style="gap: 0.4rem;">
                <span class="filter-label">그룹</span>
                <div class="select is-small">
                    <select id="ruGroupSelect"></select>
                </div>
            </div>

            <div class="is-flex is-align-items-center" style="gap: 0.4rem;">
                <span class="filter-label">프록시</span>
                <div style="position: relative; display: flex; align-items: center;">
                    <button id="ruProxyTrigger" class="button is-small is-subtle has-chevron px-3" type="button" style="border: 1px solid var(--color-border); min-width: 120px; justify-content: space-between;">
                        <span id="ruSelectionCounter">0 / 0</span>
                    </button>
                    <button class="button is-ghost is-small p-0 ml-2" id="ruDeselectAllBtn" style="font-size: 0.7rem; color: var(--color-text-muted);">모두해제</button>
                    <div style="position: absolute; visibility: hidden; height: 0;">
                        <select id="ruProxySelect" multiple></select>
                    </div>
                </div>
            </div>

            <!-- 정보 표시 인디케이터 (설정바로 이동) -->
            <div id="ruNavIndicator" class="ru-nav-indicator" style="display: none; background: transparent; padding: 0; margin-left: 0.5rem;">
                <span class="ru-nav-spinner"></span>
                <span class="is-size-7 has-text-primary" style="font-weight: 600;">수집 중</span>
            </div>
        </div>

        <div class="is-flex is-align-items-center" style="gap: 1rem; margin-left: auto;">
            <span class="settings-bar-separator"></span>
            <button class="button is-ghost is-small px-3" id="ruCopyBtn" title="현재 표시된 모든 수집값을 클립보드에 복사합니다." style="color: var(--color-text-muted);">
                <span>현재값 복사</span>
            </button>
        </div>
    </div>

    <!-- 히트맵 섹션 -->
    <div class="heatmap-container" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 0.75rem 1rem;">
        <div class="mb-1">
            <div class="is-flex is-align-items-center is-justify-content-space-between mb-2">
                <div class="is-flex is-align-items-center">
                    <h4 class="title is-6 mb-0 has-text-grey">자원 사용률 히트맵</h4>
                    <span id="ruSelectionSummary" class="is-size-7 has-text-grey-light ml-3" style="display:none;"></span>
                    <span class="is-size-7 has-text-grey-light ml-3" style="opacity:0.6;">프록시 이름 클릭 시 상세보기</span>
                </div>
                <span id="ruLastUpdated" class="is-size-7 has-text-grey-light" style="display:none;">
                    마지막 갱신: <span id="ruLastUpdatedTime">-</span>
                </span>
            </div>
            <div id="ruHeatmapLegend" class="is-size-7 mb-3"></div>
        </div>
        <div id="ruHeatmapWrap" class="ru-heatmap-scroll-wrap">
            <div id="ruHeatmapEl" style="width: 100%; min-width: 1000px;"></div>
        </div>
        <div id="ruEmptyState" class="empty-state">
            <p class="empty-state-title">데이터 없음</p>
            <p class="empty-state-body">위에서 그룹과 프록시를 선택하세요. 수집 서버가 실행 중이면 최신 데이터가 자동으로 표시됩니다.</p>
        </div>
    </div>

</div>

<!-- 프록시 상세 모달 -->
<div class="modal" id="ruProxyDetailModal">
    <div class="modal-background" style="background: rgba(15, 23, 42, 0.25);" id="ruDetailModalBg"></div>
    <div class="modal-card ru-detail-modal-card">
        <header class="modal-card-head py-3 px-5">
            <div>
                <p class="modal-card-title is-size-5 mb-0" id="ruDetailProxyName">Proxy</p>
                <p class="is-size-7 has-text-grey mt-1" id="ruDetailCollectedAt"></p>
            </div>
            <button class="delete" aria-label="close" id="ruDetailClose"></button>
        </header>
        <section class="modal-card-body p-4" style="overflow-y: auto; max-height: calc(90vh - 100px);">
            <p class="is-size-7 has-text-grey mb-3" style="font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;">현재 수집값</p>
            <div id="ruDetailTiles" class="ru-detail-tiles mb-4"></div>
            <p class="is-size-7 has-text-grey mb-2 mt-4" style="font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;">시계열 추이 (최근 60회)</p>
            <div id="ruDetailSparklines"></div>
        </section>
    </div>
</div>

<script>
$(document).ready(function() {
    // 프록시 상세 모달 닫기
    $(document).on('click', '#ruDetailClose, #ruDetailModalBg', function() {
        if (window.ResourceUsageHeatmap) window.ResourceUsageHeatmap.closeProxyDetail();
    });
});

function updateRuSelectionSummary() {
    const ru = window.ru;
    if (!ru) return;
    const groupName = $('#ruGroupSelect option:selected').text();
    const selected = $('#ruProxySelect').val() || [];
    if (!selected.length) { $('#ruSelectionSummary').hide(); return; }
    const hosts = selected.map(id => (ru.proxies || []).find(p => p.id == id)?.host).filter(Boolean);
    const label = hosts.length <= 3 ? hosts.join(', ') : `${hosts.slice(0, 3).join(', ')} 외 ${hosts.length - 3}개`;
    $('#ruSelectionSummary').text(`${groupName} · ${label}`).show();
}
</script>

<!-- Resource Usage Modules -->
<script src="/static/js/resource_usage_utils.js"></script>
<script src="/static/js/resource_usage_state.js"></script>
<script src="/static/js/resource_usage_heatmap.js"></script>
<script src="/static/js/resource_usage_charts.js"></script>
<script src="/static/js/resource_usage_polling.js"></script>
<script src="/static/js/resource_usage.js"></script>
{% endblock %}
