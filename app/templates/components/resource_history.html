{% extends "base.html" %}

{% block content %}
<!-- 이력 조회 필터 바 -->
<div class="settings-bar mb-2">
    <div class="is-flex is-align-items-center is-flex-wrap-wrap" style="gap: 1.25rem; width: 100%;">
        <div class="is-flex is-align-items-center" style="gap: 0.75rem;">
            <div class="is-flex is-align-items-center" style="gap: 0.4rem;">
                <span class="filter-label">그룹</span>
                <div class="select is-small">
                    <select id="ruHistoryGroupSelect"></select>
                </div>
            </div>
            <div class="is-flex is-align-items-center" style="gap: 0.4rem;">
                <span class="filter-label">프록시</span>
                <div style="position: relative; display: flex; align-items: center;">
                    <button id="ruHistoryProxyTrigger" class="button is-small is-subtle has-chevron px-3" type="button" style="border: 1px solid var(--color-border); min-width: 120px; justify-content: space-between;">
                        <span id="ruHistorySelectionCounter">0 / 0</span>
                    </button>
                    <button class="button is-ghost is-small p-0 ml-2" id="ruHistoryDeselectAllBtn" style="font-size: 0.7rem; color: var(--color-text-muted);">모두해제</button>
                    <div style="position: absolute; visibility: hidden; height: 0;">
                        <select id="ruHistoryProxySelect" multiple></select>
                    </div>
                </div>
            </div>
        </div>

        <div class="is-flex is-align-items-center" style="gap: 0.5rem;">
            <div class="buttons has-addons mb-0 mr-2">
                <button class="button is-small is-subtle px-2 ru-history-preset" data-range="1h">1h</button>
                <button class="button is-small is-subtle px-2 ru-history-preset" data-range="6h">6h</button>
                <button class="button is-small is-subtle px-2 ru-history-preset" data-range="12h">12h</button>
                <button class="button is-small is-subtle px-2 ru-history-preset" data-range="1d">1d</button>
                <button class="button is-small is-subtle px-2 ru-history-preset" data-range="7d">7d</button>
            </div>
            <input class="input is-small" id="ruHistoryStartTime" type="datetime-local" style="width: 190px;">
            <span class="has-text-grey">~</span>
            <input class="input is-small" id="ruHistoryEndTime" type="datetime-local" style="width: 190px;">
        </div>

        <div class="select is-small">
            <select id="ruHistoryLimit">
                <option value="100">100개씩</option>
                <option value="500" selected>500개씩</option>
                <option value="1000">1,000개씩</option>
            </select>
        </div>

        <div class="is-flex is-align-items-center ml-2">
            <span class="is-size-7 has-text-grey-light mr-2" style="font-weight: 600;">총 레코드</span>
            <span class="tag is-primary is-light is-small" id="ruHistoryTotalCount" style="font-weight: 700; border-radius: 4px;">-</span>
        </div>

        <div class="is-flex is-align-items-center mb-0 ml-auto" style="gap: 0.4rem;">
            <button class="button is-primary is-small px-4" id="ruHistorySearchBtn" style="font-weight: 600;">조회</button>
            <button class="button is-subtle is-small px-3" id="ruHistoryLoadAllBtn">전체 조회</button>
            <span class="settings-bar-separator"></span>
            <button class="button is-ghost is-small px-3" id="ruHistoryExportBtn" title="내보내기" style="color: var(--color-text-muted);">내보내기</button>
            <span class="settings-bar-separator"></span>
            <button class="button is-subtle-danger is-small px-3" id="ruHistoryDeleteBtn">삭제</button>
        </div>
    </div>
</div>

<div id="ruHistoryLoading" class="has-text-centered p-6" style="display:none;">
    <span class="loader" style="display: inline-block; width: 2rem; height: 2rem;"></span>
    <p class="mt-3 has-text-grey is-size-7">데이터를 불러오는 중입니다...</p>
</div>

<div id="ruHistoryError" class="notification is-danger is-light is-size-7 mt-2" style="display:none;"></div>

<div id="ruHistoryResults" style="display:none;">
    <p id="ruHistoryCount" class="is-size-7 has-text-grey-light mt-3 mb-2"></p>
    <div id="ruHistoryCharts" class="columns is-multiline"></div>
</div>

<!-- 삭제 모달 -->
<div class="modal" id="ruHistoryDeleteModal">
    <div class="modal-background" style="background: rgba(15, 23, 42, 0.2);"></div>
    <div class="modal-card">
        <header class="modal-card-head py-4 px-5">
            <p class="modal-card-title is-size-5 has-text-weight-bold">로그 삭제</p>
            <button class="delete" aria-label="close"></button>
        </header>
        <section class="modal-card-body p-5">
            <div class="field">
                <label class="label is-small">삭제 옵션 선택</label>
                <div class="control">
                    <label class="radio is-size-7">
                        <input type="radio" name="deleteOption" value="older" checked>
                        특정 기간 이상 된 데이터 삭제
                    </label>
                    <label class="radio is-size-7">
                        <input type="radio" name="deleteOption" value="range">
                        기간 지정 삭제
                    </label>
                    <label class="radio is-size-7 has-text-danger" style="font-weight: 600;">
                        <input type="radio" name="deleteOption" value="all">
                        ⚠ 전체 삭제 (복구 불가)
                    </label>
                </div>
            </div>
            <div id="ruDeleteOlderThan" class="field">
                <label class="label is-small">삭제할 기간 (일)</label>
                <div class="control is-flex is-align-items-center" style="gap: 0.5rem;">
                    <input class="input is-small" type="number" id="ruDeleteOlderDays" min="1" value="90" style="width: 80px;">
                    <div class="buttons has-addons mb-0">
                        <button type="button" class="button is-small is-subtle px-2 ru-delete-days-preset" data-days="30">30일</button>
                        <button type="button" class="button is-small is-subtle px-2 ru-delete-days-preset" data-days="90">90일</button>
                        <button type="button" class="button is-small is-subtle px-2 ru-delete-days-preset" data-days="180">180일</button>
                    </div>
                </div>
            </div>
            <div id="ruDeleteRange" class="field" style="display:none;">
                <div class="columns">
                    <div class="column">
                        <label class="label is-small">시작 시간</label>
                        <input class="input is-small" type="datetime-local" id="ruDeleteStartTime">
                    </div>
                    <div class="column">
                        <label class="label is-small">종료 시간</label>
                        <input class="input is-small" type="datetime-local" id="ruDeleteEndTime">
                    </div>
                </div>
            </div>
            <div class="field">
                <label class="label is-small">프록시 선택 (선택사항)</label>
                <div class="control">
                    <select id="ruDeleteProxySelect" class="ts-fullwidth">
                        <option value="">전체</option>
                    </select>
                </div>
            </div>
            <div class="notification is-warning is-light py-3 px-4 is-size-7">
                <strong>경고:</strong> 삭제된 데이터는 복구할 수 없습니다.
            </div>
        </section>
        <footer class="modal-card-foot is-justify-content-flex-end py-3 px-5">
            <button class="button is-subtle is-small px-4" id="ruHistoryDeleteCancelBtn">취소</button>
            <button class="button is-danger is-small px-5" id="ruHistoryDeleteConfirmBtn">삭제</button>
        </footer>
    </div>
</div>

<script>
$(document).on('click', '.ru-delete-days-preset', function() {
    $('#ruDeleteOlderDays').val($(this).data('days'));
});
</script>

<script src="/static/js/resource_usage_utils.js"></script>
<script src="/static/js/resource_history.js?v={{ request.app.version }}"></script>
{% endblock %}
