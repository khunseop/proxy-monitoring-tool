<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PMT</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="stylesheet" href="/static/vendor/bulma/bulma-no-dark-mode.css">
    <!-- AG Grid CSS -->
    <link rel="stylesheet" href="/static/vendor/ag-grid/ag-grid.css">
    <link rel="stylesheet" href="/static/vendor/ag-grid/ag-theme-quartz.css">
    
    <link rel="stylesheet" href="/static/theme/theme.css?v={{ request.app.version }}">
    <script src="/static/vendor/jquery/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="/static/vendor/tom-select/tom-select.css">
    <script src="/static/vendor/tom-select/tom-select.complete.min.js"></script>
    
    <!-- Vendor JS -->
    <script src="/static/vendor/ag-grid/ag-grid-community.js"></script>
    <script src="/static/vendor/apexcharts/apexcharts.min.js"></script>
    
    <script src="/static/js/common.js?v={{ request.app.version }}"></script>
    <script src="/static/js/device_selector.js?v={{ request.app.version }}"></script>
    <script src="/static/js/table_config.js?v={{ request.app.version }}"></script>
</head>
<body>
    <nav class="navbar" role="navigation" aria-label="main navigation">
        <div class="container is-fluid px-5">
            <div class="navbar-brand">
                <a class="navbar-item has-text-weight-bold is-size-5" href="/" style="color: var(--color-primary); letter-spacing: -0.5px;">
                    PMT
                </a>
                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="mainNavbar">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>

            <div id="mainNavbar" class="navbar-menu">
                <div class="navbar-start">
                    <a class="navbar-item {% if request.url.path == '/' or request.url.path == '/resource' %}is-active{% endif %}" href="/resource">
                        실시간 모니터링
                    </a>
                    <a class="navbar-item {% if request.url.path == '/resource/history' %}is-active{% endif %}" href="/resource/history">
                        자원이력
                    </a>
                    <a class="navbar-item {% if request.url.path.startswith('/session') %}is-active{% endif %}" href="/session">
                        세션브라우저
                    </a>
                    <a class="navbar-item {% if request.url.path == '/traffic-logs' %}is-active{% endif %}" href="/traffic-logs">
                        로그조회
                    </a>
                    <a class="navbar-item {% if request.url.path.startswith('/proxy') %}is-active{% endif %}" href="/proxy">
                        프록시관리
                    </a>
                    <a class="navbar-item {% if request.url.path == '/settings' %}is-active{% endif %}" href="/settings">
                        설정
                    </a>
                </div>
                <div class="navbar-end">
                    <div class="navbar-item">
                        <div id="ruNavIndicator" class="ru-nav-indicator" style="display: none;">
                            <span class="ru-nav-spinner"></span>
                            <span class="ru-nav-text">수집 중...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="section main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <footer class="footer">
        <div class="content has-text-centered is-size-7">
            <p>
                <strong>PMT</strong> v{{ request.app.version }} · Made by hunseop.kim · <a href="https://github.com/khunseop/mwg-monitoring-tool" target="_blank" rel="noopener">GitHub</a>
            </p>
        </div>
    </footer>

    <script src="/static/js/base.js?v={{ request.app.version }}"></script>
</body>
</html>
